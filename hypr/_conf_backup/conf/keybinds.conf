# =====================================================================
# CẤU HÌNH PHÍM TẮT
# =====================================================================

$mainMod = SUPER

# =====================================================================
# 1. CÁC PHÍM TẮT CƠ BẢN MỞ ỨNG DỤNG
# =====================================================================
bind = $mainMod, Q, exec, kitty
bind = $mainMod, E, exec, kitty -e yazi
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod, C, killactive
bind = $mainMod, B, exec, firefox

# =====================================================================
# 2. ĐIỀU HƯỚNG CỬA SỔ (Hệ phím HJKL kiểu Vim)
# =====================================================================
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Hoán đổi vị trí cửa sổ
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Fullscreen & Float
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, togglefloating

# =====================================================================
# 3. CÁC PHÍM TẮT TIỆN ÍCH & SCRIPT
# =====================================================================

# 📸 Chụp màn hình vùng chọn (Grim + Slurp)
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" ~/Pictures/$(date +'%Y-%m-%d-%H%M%S_grim.png')

# ⌨️ Đổi ngôn ngữ IBus (EN/VI) + switch keyboard layout
bind = $mainMod, SPACE, exec, bash -c 'CURRENT=$(ibus engine); if [ "$CURRENT" = "m17n:vi:telex" ]; then ibus engine xkb:us::eng; hyprctl switchxkblayout all 0; else ibus engine m17n:vi:telex; hyprctl switchxkblayout all 1; fi'

# 📋 Quản lý Clipboard (Cliphist)
bind = $mainMod, V, exec, ~/.config/hypr/scripts/clipboard_launcher.sh

# 🎨 Chọn hình nền & auto-update màu via Wallust
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaper_select.sh
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/wallpaper_random.sh

# =====================================================================
# 4. WORKSPACE BINDINGS (1-10)
# =====================================================================
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10


# Di chuyển cửa sổ sang workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# =====================================================================
# 5. MOUSE BINDINGS - DI CHUYỂN & RESIZE FLOATING WINDOWS
# =====================================================================
# Super + Left Click: Di chuyển floating window
bindm = $mainMod, mouse:272, movewindow

# Super + Right Click: Resize floating window
bindm = $mainMod, mouse:273, resizewindow

# =====================================================================
# 6. MEDIA KEYS - AUDIO (PipeWire/wpctl)
# =====================================================================
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
