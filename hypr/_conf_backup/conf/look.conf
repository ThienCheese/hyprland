# =====================================================================
# CẤU HÌNH GIAO DIỆN - GAPS, BORDER, DECORATION, ANIMATION
# =====================================================================

# Import wallust colors (sinh bởi wallust - auto-update)
source = ~/.config/hypr/wallust/wallust-hyprland.conf

general {
    gaps_in = 5
    gaps_out = 15
    border_size = 2
    col.active_border = $color1 $color2 45deg
    col.inactive_border = $background
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.9
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

# Animation curves
bezier = easeOutQuint, 0.23, 1, 0.32, 1
bezier = linear, 0, 0, 1, 1
bezier = almostLinear, 0.5, 0.5, 0.75, 1
bezier = quick, 0.15, 0, 0.1, 1
bezier = easy, 0, 0.85, 0.1, 1

# Animations
animation = global, 1, 10, default
animation = windows, 1, 4.79, easy
animation = windowsMove, 1, 4.79, easy
animation = windowsIn, 1, 4, easy
animation = workspaces, 1, 1.94, almostLinear

# =====================================================================
# WINDOW RULES - CÁC CỬA SỔ NỔI
# =====================================================================

# Floating WiFi (nmtui)
windowrule = float class:floating_wifi
windowrule = size 400 550 class:floating_wifi
windowrule = move 65% 55 class:floating_wifi

# Bluetooth Manager
windowrule = float class:blueman-manager
windowrule = size 450 550 class:blueman-manager
windowrule = move 70% 55 class:blueman-manager
